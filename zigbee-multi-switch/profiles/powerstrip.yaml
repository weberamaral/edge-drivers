name: powerstrip
components:
  - id: main
    capabilities:
      - id: switch
        version: 1
      - id: refresh
        version: 1
      - id: signalprogram56169.switchSummary
        version: 1
    categories:
      - name: SmartPlug
  - id: switch1
    capabilities:
      - id: switch
        version: 1
  - id: switch2
    capabilities:
      - id: switch
        version: 1
  - id: switch3
    capabilities:
      - id: switch
        version: 1
  - id: switch4
    capabilities:
      - id: switch
        version: 1
preferences:
  - name: restoreState
    title: Estado após falta de energia
    description: "Após o restabelecimento da energia, o estado pode ser restaurado ao estado anterior ou permanecer desligado."
    preferenceType: enumeration
    definition:
      options:
        "0": "Sempre desligada"
        "1": "Sempre ligada"
        "255": "Último estado"
      default: "255"
metadata:
  deviceType: SmartPlug
  ocfDeviceType: oic.d.smartplug
